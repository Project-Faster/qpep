name: CodeIntegration

on:
  workflow_dispatch:
  push:
    branches: [ "main", "testing-*", "issue*" ]

run-name: Code Integration [${{ github.event_name }}][${{ github.head_ref || github.ref_name }}] rev.${{ github.sha }}

jobs:
  build-mac-os:
    runs-on: macos-latest
    env:
      GO_VERSION: 1.20.14
      CMAKE_VERSION: '3.22.x'
      GOARCH: arm64
      GOOS: darwin
      CGO_ENABLED: 1
      GOPATH: ${{ github.workspace }}/.go
      CMAKE_BUILD_PARALLEL_LEVEL: 4
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v1.14
        with:
          cmake-version: ${{ env.CMAKE_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Prepare
        run: |
          go clean -cache -x
          mkdir -p $GOPATH/bin
          pip install dmgbuild

      - name: Build Backends
        run: |
          export CPP=${CXX}
          export PATH=$GOPATH/bin:$GOPATH/bin/${GOOS}_${GOARCH}:$PATH
          cd backend/
          go generate

      - name: Build Executable
        run: |
          go build -v -o build/qpep

      - name: Build QPep Tray 64bits
        run: |
          pushd qpep-tray
          go build -v -o ../build/qpep-tray
          popd

      - name: Build MacOS installer
        if: ${{ false }}
        run: |
          dmgbuild --version

      - uses: actions/upload-artifact@v4
        with:
          name: qpep_macos_b${{ github.run_id }}
          path: build/

  build-linux:
    runs-on: ubuntu-latest
    env:
      GO_VERSION: 1.20.14
      CMAKE_VERSION: '3.22.x'
      GOARCH: amd64
      GOOS: linux
      CGO_ENABLED: 1
      GOPATH: ${{ github.workspace }}/.go
      CMAKE_BUILD_PARALLEL_LEVEL: 8
    defaults:
      run:
        shell: bash

    steps:
    - uses: actions/checkout@v4
      with:
        clean: true
        submodules: true

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Set up CMake
      uses: jwlawson/actions-setup-cmake@v1.14
      with:
        cmake-version: ${{ env.CMAKE_VERSION }}

    - name: Prepare
      run: |
        go clean -cache -x
        sudo apt-get update -y
        sudo apt-get install -y libayatana-appindicator3-dev

    - name: Build Backends
      run: |
        cd backend/
        export PATH=$GOPATH/bin:$PATH
        go generate

    - name: Build Executable
      run: |
        go build -v -o build/qpep

    - name: Build QPep Tray
      run: |
        pushd qpep-tray
        export CGO_ENABLED=0
        go build -x ubuntu -v -o ..\build\qpep-tray
        popd

    - uses: actions/upload-artifact@v4
      with:
        name: qpep_linux_b${{ github.run_id }}
        path: build/

  build-windows:
    runs-on: windows-latest
    env:
      GO_VERSION: 1.20.14
      CMAKE_VERSION: '3.22.x'
      GOARCH: amd64
      GOOS: windows
      CGO_ENABLED: 1
      QPEP_CI_ENV: 1
      GOPATH: ${{ github.workspace }}\.go
      CMAKE_BUILD_PARALLEL_LEVEL: 4
    defaults:
      run:
        shell: cmd

    steps:
    - uses: actions/checkout@v4
      with:
        clean: true
        submodules: true

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Install Wix
      uses: actions/checkout@v2
      with:
        repository: fbarresi/wix
        path: wix

    - name: Install MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Set up MinGW
      uses: egor-tensin/setup-mingw@v2
      with:
        platform: x64
        static: false
        version: 11.1.0

    - name: Set up CMake
      uses: jwlawson/actions-setup-cmake@v1.14
      with:
        cmake-version: ${{ env.CMAKE_VERSION }}

    - name: Prepare
      run: |
        MKDIR %GOPATH%\bin
        MKDIR build
        MKDIR build\64bits
        MKDIR build\32bits
        COPY /Y windivert\LICENSE build\LICENSE.windivert
        COPY /Y LICENSE build\LICENSE
        go clean -cache -x
        COPY /Y windivert\x64\* build\64bits

    - name: Build Backends
      run: |
        cd backend/
        set PATH=%GOPATH%\bin;%PATH%
        go generate

    - name: Build QPep
      run: |
         go build -o build\64bits\qpep.exe

    - name: Build QPep Tray
      run: |
         pushd qpep-tray
         export CGO_ENABLED=0
         go build -ldflags -H=windowsgui -o ..\build\64bits\qpep-tray.exe
         popd

    - name: Build QPep Installer
      run: |
        sed -E 's/Version="[^"]+"/Version="1.0.0.0-dev${{github.run_id}}"/' installer/installer.wxs > installer/installer.wxs
        sed -E 's/FileVersion:\s*"[^"]+"/FileVersion:\s*"0.0.0-dev${{github.run_id}}"/' version/versioninfo.json > version/versioninfo.json
        sed -E 's/ProductVersion:\s*"[^"]+"/ProductVersion:\s*"0.0.0-dev${{github.run_id}}"/' version/versioninfo.json > version/versioninfo.json
        set PATH=${{ github.workspace }}\wix\tools;%PATH%
        msbuild installer\installer.sln

    - uses: actions/upload-artifact@v4
      with:
        name: qpep_windows_b${{ github.run_id }}
        path: build/installer.msi

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: windows_generated_code
        path: backend/quicly-go/internal/deps/

  unit-tests-linux:
    if: ${{ false }}
    needs: [ build-linux ]
    runs-on: ubuntu-latest
    env:
      GO_VERSION: 1.20.14
      CMAKE_VERSION: '3.22.x'
      GOARCH: amd64
      GOOS: linux
      CGO_ENABLED: 1
      QPEP_CI_ENV: 1
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Prepare
        run: |
          mkdir build
          go install github.com/jstemmer/go-junit-report@v1.0.0
          go install github.com/axw/gocov/gocov@v1.1.0
          go install github.com/matm/gocov-html/cmd/gocov-html@v1.2.0
          go install github.com/AlekSi/gocov-xml@v1.1.0

      - name: Test
        run: |
          set -x
          for i in $(go list ./... | grep -v tray | sed -n -e 's/github.com\/parvit\/qpep\///p')
          do
            pushd $i
            go test -v -gcflags=-l -cover -c -o qpep.$(basename $PWD).test || true
            ./qpep.$(basename $PWD).test -test.v -test.timeout 5m -test.coverprofile=cover.out &> unit_tests.out || true
            cat unit_tests.out | go-junit-report > ../unit_tests_$(basename $PWD).xml
            popd
          done
        continue-on-error: true

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          check_name: "Unit Tests - Linux Platform"
          junit_files: "unit_tests_*.xml"

      - name: Publish Coverage Results
        if: always()
        run: |
          for i in $(go list ./... | grep -v tray | sed -n -e 's/github.com\/parvit\/qpep\///p')
          do
            pushd $i
            echo "=== Package $i ==="  >> $GITHUB_STEP_SUMMARY
            gocov convert cover.out | gocov report | grep "Total Coverage" >> $GITHUB_STEP_SUMMARY || true
            gocov convert cover.out | gocov-html -s ../.style.css > ../report_$(basename $PWD).html || true
            popd
          done
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linux_tests_output
          path: "${{ github.workspace }}/**/unit_tests.out"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linux_coverage_report
          path: report_*.html

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linux_generated_code
          path: backend/quicly-go/internal/deps/

  unit-tests-windows:
    if: ${{ false }}
    needs: [ build-windows ]
    runs-on: windows-latest
    env:
      GO_VERSION: 1.20.14
      CMAKE_VERSION: '3.22.x'
      GOARCH: amd64
      GOOS: windows
      CGO_ENABLED: 1
      QPEP_CI_ENV: 1
    defaults:
      run:
        shell: cmd

    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Prepare Test
        run: |
          go install github.com/jstemmer/go-junit-report@v1.0.0
          go install github.com/axw/gocov/gocov@v1.1.0
          go install github.com/matm/gocov-html/cmd/gocov-html@v1.2.0
          go install github.com/AlekSi/gocov-xml@v1.1.0

      - name: Test
        shell: bash
        run: |
          set -x
          go generate github.com/project-faster/qpep/windivert
          for i in $(go list ./... | grep -v tray | sed -n -e 's/github.com\/parvit\/qpep\///p')
          do
            pushd $i
            go test -v -gcflags=-l -cover -c -o qpep.$(basename $PWD).test || true
            ./qpep.$(basename $PWD).test -test.v -test.timeout 5m -test.coverprofile=cover.out &> unit_tests.out || true
            cat unit_tests.out | go-junit-report > ../unit_tests_$(basename $PWD).xml
            popd
          done
        continue-on-error: true

      - name: Publish Unit Test Results
        uses: EnricoMi/publish-unit-test-result-action/composite@v2
        if: always()
        with:
          check_name: "Unit Tests - Windows Platform"
          junit_files: "unit_tests_*.xml"

      - name: Test Results
        shell: bash
        if: always()
        run: |
          set -x
          for i in $(go list ./... | grep -v tray | sed -n -e 's/github.com\/parvit\/qpep\///p')
          do
            pushd $i
            echo "=== Package $i ==="  >> $GITHUB_STEP_SUMMARY
            gocov convert cover.out | gocov report | grep "Total Coverage" >> $GITHUB_STEP_SUMMARY || true
            gocov convert cover.out | gocov-html -s ../.style.css > ../report_$(basename $PWD).html || true
            popd
          done
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows_coverage_output
          path: unit_tests_*.xml

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows_coverage_report
          path: report_*.html
